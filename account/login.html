<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>My Account — Off-Limits Entertainment</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bc13fe; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem; cursor: auto;
        }
        .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .accent-color { color: var(--accent); }
        .login-card { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07); padding: 3rem; width: 100%; max-width: 440px; }
        .tab-btn {
            flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888;
            padding: 0.6rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; cursor: pointer;
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .form-control {
            background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important; border-radius: 0 !important; padding: 0.75rem 1rem; font-size: 16px;
        }
        .form-control:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(188,19,254,0.15) !important; background: rgba(255,255,255,0.06) !important; }
        .form-control::placeholder { color: #555 !important; }
        .btn-accent {
            background: var(--accent); color: #fff; border: none; border-radius: 0; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; width: 100%; padding: 0.85rem; font-size: 0.9rem; cursor: pointer;
        }
        .btn-accent:hover { background: #9a0fd4; box-shadow: 0 0 20px rgba(188,19,254,0.4); }
        .btn-accent:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { color: #666; text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: var(--accent); }
        .error-box { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.35); color: #ff6b6b; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .success-box { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35); color: #4ade80; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-label { display: block; color: #888; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.4rem; }
        .field { margin-bottom: 1.25rem; }
    </style>
</head>
<body>

<div class="login-card">
    <div style="text-align:center; margin-bottom:2rem;">
        <a href="../index.html" style="text-decoration:none; display:inline-flex; align-items:center; gap:0.6rem;">
            <img src="../assets/images/Logo.jpg" alt="Off-Limits Entertainment" style="height:40px; width:auto; border-radius:4px;">
            <span class="brand-font" style="font-size:1.1rem; color:#fff;">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
        </a>
        <p style="color:#555; font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; margin-top:0.5rem;">Fan Account</p>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="tab-btn active" id="tabSignIn">Sign In</button>
        <button class="tab-btn" id="tabSignUp">Sign Up</button>
    </div>

    <div id="acctError" class="error-box d-none"></div>
    <div id="acctSuccess" class="success-box d-none"></div>

    <form id="signInForm">
        <div class="field">
            <label class="form-label" for="siEmail">Email</label>
            <input type="email" id="siEmail" class="form-control" required autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="field" style="margin-bottom:1.75rem;">
            <label class="form-label" for="siPassword">Password</label>
            <input type="password" id="siPassword" class="form-control" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-accent" id="siBtn"><i class="bi bi-box-arrow-in-right" style="margin-right:0.5rem;"></i>Sign In</button>
    </form>

    <form id="signUpForm" class="d-none">
        <div class="field">
            <label class="form-label" for="suName">Display Name</label>
            <input type="text" id="suName" class="form-control" required placeholder="Your name">
        </div>
        <div class="field">
            <label class="form-label" for="suEmail">Email</label>
            <input type="email" id="suEmail" class="form-control" required autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="field" style="margin-bottom:1.75rem;">
            <label class="form-label" for="suPassword">Password</label>
            <input type="password" id="suPassword" class="form-control" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn-accent" id="suBtn"><i class="bi bi-person-plus" style="margin-right:0.5rem;"></i>Create Account</button>
    </form>

    <div style="text-align:center; margin-top:1.5rem;">
        <a href="../index.html" class="back-link"><i class="bi bi-arrow-left" style="margin-right:0.25rem;"></i>Back to main site</a>
    </div>
    <div style="text-align:center; margin-top:0.6rem;">
        <a href="../portal/login.html" class="back-link">Artist / Staff? Sign in here</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
    const tabSignIn = document.getElementById('tabSignIn');
    const tabSignUp = document.getElementById('tabSignUp');
    const signInForm = document.getElementById('signInForm');
    const signUpForm = document.getElementById('signUpForm');
    const errorBox = document.getElementById('acctError');
    const successBox = document.getElementById('acctSuccess');

    function resetMessages() {
        errorBox.classList.add('d-none');
        successBox.classList.add('d-none');
    }
    function showError(msg) { resetMessages(); errorBox.textContent = msg; errorBox.classList.remove('d-none'); }
    function showSuccess(msg) { resetMessages(); successBox.textContent = msg; successBox.classList.remove('d-none'); }

    tabSignIn.addEventListener('click', () => {
        tabSignIn.classList.add('active'); tabSignUp.classList.remove('active');
        signInForm.classList.remove('d-none'); signUpForm.classList.add('d-none');
        resetMessages();
    });
    tabSignUp.addEventListener('click', () => {
        tabSignUp.classList.add('active'); tabSignIn.classList.remove('active');
        signUpForm.classList.remove('d-none'); signInForm.classList.add('d-none');
        resetMessages();
    });

    (async () => {
        if (!supabaseClient) { showError('Supabase is not configured yet. Edit assets/js/supabase-config.js.'); return; }
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
    })();

    signInForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabaseClient) { showError('Supabase is not configured yet.'); return; }
        resetMessages();
        const btn = document.getElementById('siBtn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';

        const { error } = await supabaseClient.auth.signInWithPassword({
            email: document.getElementById('siEmail').value,
            password: document.getElementById('siPassword').value,
        });

        if (error) {
            showError('Invalid email or password.');
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right" style="margin-right:0.5rem;"></i>Sign In';
        } else {
            window.location.href = 'dashboard.html';
        }
    });

    signUpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabaseClient) { showError('Supabase is not configured yet.'); return; }
        resetMessages();
        const btn = document.getElementById('suBtn');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating...';

        const displayName = document.getElementById('suName').value;
        const email = document.getElementById('suEmail').value;
        const password = document.getElementById('suPassword').value;

        const { data, error } = await supabaseClient.auth.signUp({ email, password });

        if (error) {
            showError(error.message);
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-plus" style="margin-right:0.5rem;"></i>Create Account';
            return;
        }

        if (data.session) {
            // Email confirmation is disabled on this project — we're logged in immediately.
            await supabaseClient.from('fan_profiles').insert({ id: data.user.id, display_name: displayName });
            window.location.href = 'dashboard.html';
        } else {
            showSuccess('Account created! Check your email to confirm, then sign in.');
            signUpForm.reset();
            btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-plus" style="margin-right:0.5rem;"></i>Create Account';
        }
    });
</script>
</body>
</html>
