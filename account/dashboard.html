<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>My Account — Off-Limits Entertainment</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bc13fe; }
        body { background: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; cursor: auto; }
        .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .accent-color { color: var(--accent); }
        .topbar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
            padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .chat-wrap { max-width: 720px; margin: 2rem auto; padding: 0 1.5rem; }
        .chat-window {
            background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07);
            height: 50vh; min-height: 320px; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem;
        }
        .msg { max-width: 75%; padding: 0.6rem 0.9rem; font-size: 0.9rem; line-height: 1.4; }
        .msg-user { align-self: flex-end; background: var(--accent); color: #fff; }
        .msg-admin { align-self: flex-start; background: rgba(255,255,255,0.06); color: #eee; }
        .msg-time { font-size: 0.65rem; opacity: 0.6; margin-top: 0.25rem; display: block; }
        .chat-input-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .chat-input {
            flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.75rem 1rem; font-size: 16px;
        }
        .chat-send-btn {
            background: var(--accent); color: #fff; border: none; padding: 0 1.5rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; cursor: pointer;
        }
        .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state { color: #666; text-align: center; margin: auto; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="d-flex align-items-center gap-2">
        <img src="../assets/images/Logo.jpg" alt="Off-Limits Entertainment" style="height:32px;width:auto;border-radius:3px;">
        <span class="brand-font" style="font-size:0.9rem;">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span class="text-muted small">Welcome, <span class="accent-color" id="fanName">Fan</span></span>
        <a href="../index.html" class="btn btn-sm btn-outline-secondary" style="border-radius:0;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;"><i class="bi bi-globe me-1"></i>View Site</a>
        <a href="#" id="fanLogout" class="btn btn-sm btn-outline-danger" style="border-radius:0;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;"><i class="bi bi-box-arrow-left me-1"></i>Sign Out</a>
    </div>
</div>

<div class="chat-wrap" style="max-width:960px;">
    <ul class="nav nav-tabs mb-4" style="border-color:rgba(255,255,255,0.07);">
        <li class="nav-item"><button class="nav-link active" id="tabUpdates" style="background:transparent;color:#fff;border-color:rgba(255,255,255,0.07) rgba(255,255,255,0.07) transparent;">Updates</button></li>
        <li class="nav-item"><button class="nav-link" id="tabMedia" style="background:transparent;color:#888;border:none;">Music &amp; Videos</button></li>
        <li class="nav-item"><button class="nav-link" id="tabMessages" style="background:transparent;color:#888;border:none;">Messages</button></li>
    </ul>

    <!-- UPDATES -->
    <div id="updatesPane">
        <h4 class="brand-font mb-3" style="font-size:1rem;">Upcoming Events</h4>
        <div id="updatesEvents" class="row g-3 mb-5"><p class="empty-state">Loading…</p></div>
        <h4 class="brand-font mb-3" style="font-size:1rem;">Latest Releases</h4>
        <div id="updatesReleases" class="row g-3"><p class="empty-state">Loading…</p></div>
    </div>

    <!-- MEDIA -->
    <div id="mediaPane" class="d-none">
        <div class="row g-3" id="mediaGrid"><p class="empty-state">Loading…</p></div>
    </div>

    <!-- MESSAGES -->
    <div id="messagesPane" class="d-none">
        <p class="text-muted small mb-3">Questions about an artist, a release, or your account? Message our team directly — we typically reply within 1-2 business days.</p>
        <div class="chat-window" id="chatWindow">
            <p class="empty-state">Loading conversation…</p>
        </div>
        <form class="chat-input-row" id="chatForm">
            <input type="text" class="chat-input" id="chatInput" placeholder="Type a message…" required maxlength="1000" autocomplete="off">
            <button type="submit" class="chat-send-btn" id="chatSendBtn"><i class="bi bi-send"></i></button>
        </form>
    </div>
</div>

<style>
    .update-card, .fan-media-card {
        background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07); padding: 1rem;
    }
    .fan-media-card audio, .fan-media-card video { width: 100%; margin-top: 0.5rem; }
    .fan-media-card video { max-height: 200px; background: #000; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/account.js"></script>
<script>
(async () => {
    const { user, profile } = await requireFanAuth();
    document.getElementById('fanName').textContent = profile.display_name;

    document.getElementById('fanLogout').addEventListener('click', async (e) => {
        e.preventDefault();
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html';
    });

    // ---- Tabs ----
    const tabs = {
        tabUpdates: document.getElementById('updatesPane'),
        tabMedia: document.getElementById('mediaPane'),
        tabMessages: document.getElementById('messagesPane'),
    };
    Object.entries(tabs).forEach(([btnId, pane]) => {
        document.getElementById(btnId).addEventListener('click', () => {
            Object.entries(tabs).forEach(([id, p]) => {
                const btn = document.getElementById(id);
                const active = id === btnId;
                btn.classList.toggle('active', active);
                btn.style.color = active ? '#fff' : '#888';
                p.classList.toggle('d-none', !active);
            });
        });
    });

    // ---- Updates: upcoming events + latest releases ----
    const today = new Date().toISOString().slice(0, 10);
    const { data: events } = await supabaseClient
        .from('events').select('*, artists(name)').gte('event_date', today).order('event_date').limit(6);
    document.getElementById('updatesEvents').innerHTML = (events && events.length)
        ? events.map(e => `
            <div class="col-md-6 col-lg-4">
                <div class="update-card">
                    <p class="text-muted x-small mb-1">${e.event_date}</p>
                    <h6 class="fw-bold mb-1">${e.title}</h6>
                    <p class="small text-muted mb-0">${e.venue}, ${e.city}</p>
                    ${e.artists ? `<p class="small accent-color mb-0">${e.artists.name}</p>` : ''}
                </div>
            </div>`).join('')
        : '<p class="empty-state">No upcoming events right now.</p>';

    const { data: releases } = await supabaseClient
        .from('releases').select('*, artists(name)').order('release_date', { ascending: false }).limit(6);
    document.getElementById('updatesReleases').innerHTML = (releases && releases.length)
        ? releases.map(r => `
            <div class="col-md-6 col-lg-4">
                <div class="update-card">
                    <p class="text-muted x-small mb-1">${r.release_date}</p>
                    <h6 class="fw-bold mb-1">${r.title}</h6>
                    <p class="small text-muted mb-0 text-capitalize">${r.type}${r.artists ? ' · ' + r.artists.name : ''}</p>
                </div>
            </div>`).join('')
        : '<p class="empty-state">No releases yet.</p>';

    // ---- Media: browse public artist uploads ----
    const { data: media } = await supabaseClient
        .from('artist_media').select('*, artists(name)').eq('is_public', true).order('created_at', { ascending: false }).limit(24);
    const mediaGrid = document.getElementById('mediaGrid');
    mediaGrid.innerHTML = (media && media.length) ? media.map(m => {
        const url = supabaseClient.storage.from('artist-media').getPublicUrl(m.file_path).data.publicUrl;
        const player = m.media_type === 'audio' ? `<audio controls src="${url}"></audio>` : `<video controls src="${url}"></video>`;
        return `
            <div class="col-md-6 col-lg-4">
                <div class="fan-media-card">
                    <h6 class="fw-bold mb-0">${m.title}</h6>
                    <p class="small accent-color mb-0">${m.artists ? m.artists.name : ''}</p>
                    ${player}
                </div>
            </div>`;
    }).join('') : '<p class="empty-state">No music or videos have been shared yet.</p>';

    const chatWindow = document.getElementById('chatWindow');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');

    function renderMessages(messages) {
        if (!messages.length) {
            chatWindow.innerHTML = '<p class="empty-state">No messages yet — say hello!</p>';
            return;
        }
        chatWindow.innerHTML = messages.map(m => `
            <div class="msg ${m.sender === 'user' ? 'msg-user' : 'msg-admin'}">
                ${m.message}
                <span class="msg-time">${new Date(m.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}</span>
            </div>
        `).join('');
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function loadMessages() {
        const { data } = await supabaseClient
            .from('direct_messages').select('*').eq('user_id', user.id).order('created_at', { ascending: true });
        renderMessages(data || []);
    }
    await loadMessages();

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;
        const sendBtn = document.getElementById('chatSendBtn');
        sendBtn.disabled = true;

        const { error } = await supabaseClient.from('direct_messages').insert({
            user_id: user.id, sender: 'user', message: text,
        });
        if (!error) {
            chatInput.value = '';
            await loadMessages();
        }
        sendBtn.disabled = false;
    });

    // Live updates when staff reply
    supabaseClient
        .channel('direct_messages_' + user.id)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'direct_messages', filter: `user_id=eq.${user.id}` }, loadMessages)
        .subscribe();
})();
</script>
</body>
</html>
