<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Artist Portal — Off-Limits Entertainment</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bc13fe; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem; cursor: auto;
        }
        .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .accent-color { color: var(--accent); }
        .login-card { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.07); padding: 3rem; width: 100%; max-width: 440px; }
        .form-control {
            background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important; border-radius: 0 !important; padding: 0.75rem 1rem; font-size: 16px;
        }
        .form-control:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(188,19,254,0.15) !important; background: rgba(255,255,255,0.06) !important; }
        .form-control::placeholder { color: #555 !important; }
        .btn-accent {
            background: var(--accent); color: #fff; border: none; border-radius: 0; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.3s ease; width: 100%;
            padding: 0.85rem; font-size: 0.9rem; cursor: pointer;
        }
        .btn-accent:hover { background: #9a0fd4; box-shadow: 0 0 20px rgba(188,19,254,0.4); }
        .btn-accent:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { color: #666; text-decoration: none; font-size: 0.8rem; transition: color 0.2s; }
        .back-link:hover { color: var(--accent); }
        .error-box { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.35); color: #ff6b6b; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .form-label { display: block; color: #888; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.4rem; }
        .field { margin-bottom: 1.25rem; }
    </style>
</head>
<body>

<div class="login-card">
    <div style="text-align:center; margin-bottom:2rem;">
        <a href="../index.html" style="text-decoration:none; display:inline-flex; align-items:center; gap:0.6rem;">
            <img src="../assets/images/Logo.jpg" alt="Off-Limits Entertainment" style="height:40px; width:auto; border-radius:4px;">
            <span class="brand-font" style="font-size:1.1rem; color:#fff;">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
        </a>
        <p style="color:#555; font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; margin-top:0.5rem;">Artist Portal</p>
    </div>

    <div id="loginError" class="error-box d-none"></div>

    <form id="loginForm">
        <div class="field">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="field" style="margin-bottom:1.75rem;">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-accent" id="loginBtn">
            <i class="bi bi-box-arrow-in-right" style="margin-right:0.5rem;"></i>Sign In
        </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem;">
        <a href="../index.html" class="back-link"><i class="bi bi-arrow-left" style="margin-right:0.25rem;"></i>Back to main site</a>
    </div>
    <div style="text-align:center; margin-top:0.6rem;">
        <a href="mailto:ar@offlimitsentertainment.com" class="back-link">Need access? Contact A&amp;R</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    function showError(msg) {
        loginError.textContent = msg;
        loginError.classList.remove('d-none');
    }

    // Already signed in? Skip straight to the dashboard.
    (async () => {
        if (!supabaseClient) {
            showError('Supabase is not configured yet. Edit assets/js/supabase-config.js with your project URL and anon key.');
            return;
        }
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = 'dashboard.html';
    })();

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!supabaseClient) { showError('Supabase is not configured yet.'); return; }

        loginError.classList.add('d-none');
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            showError('Invalid email or password.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right" style="margin-right:0.5rem;"></i>Sign In';
        } else {
            window.location.href = 'dashboard.html';
        }
    });
</script>
</body>
</html>
