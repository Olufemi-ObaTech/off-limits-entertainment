<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Demo Submissions — Off-Limits Artist Portal</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <a href="../index.html" class="text-decoration-none d-flex align-items-center gap-2">
            <img src="../assets/images/Logo.jpg" alt="Off-Limits Entertainment" style="height:32px;width:auto;border-radius:3px;">
            <span class="brand-font text-white" style="font-size:0.9rem;">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
        </a>
        <p class="text-muted mb-0 mt-1" style="font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;">Artist Portal</p>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="releases.html"><i class="bi bi-vinyl-fill"></i> My Releases</a>
        <a href="analytics.html"><i class="bi bi-bar-chart-fill"></i> Analytics</a>
        <a href="royalties.html"><i class="bi bi-cash-stack"></i> Royalties</a>
        <a href="events.html"><i class="bi bi-calendar-event-fill"></i> Events</a>
        <a href="profile.html"><i class="bi bi-person-fill"></i> My Profile</a>
        <a href="messages.html"><i class="bi bi-chat-dots-fill"></i> Messages</a>
        <a href="demos.html" class="active"><i class="bi bi-music-note-list"></i> Demo Submissions</a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" id="portalLogout" class="d-flex align-items-center gap-2 text-muted text-decoration-none" style="font-size:0.85rem;">
            <i class="bi bi-box-arrow-left"></i> Sign Out
        </a>
    </div>
</aside>

<main class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div>
                <h4 class="brand-font mb-0" style="font-size:1rem;">Demo Submissions</h4>
                <p class="text-muted small mb-0">Welcome back, <span class="accent-color" data-artist-name>Artist</span></p>
            </div>
        </div>
        <a href="../index.html" class="btn btn-sm btn-outline-secondary" style="border-radius:0;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;">
            <i class="bi bi-globe me-1"></i>View Site
        </a>
    </div>

    <div class="table-responsive">
        <table class="table portal-table">
            <thead><tr><th>Artist</th><th>Email</th><th>Genre</th><th>Country</th><th>Stream</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="demosBody"><tr><td colspan="7" class="text-center text-muted py-5">Loading…</td></tr></tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/portal.js"></script>
<script>
(async () => {
    await requirePortalAuth();
    const { data: demos } = await supabaseClient
        .from('demo_submissions').select('*').order('created_at', { ascending: false });

    const body = document.getElementById('demosBody');
    if (!demos || !demos.length) {
        body.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-5">No submissions yet.</td></tr>';
        return;
    }
    body.innerHTML = demos.map(d => `
        <tr>
            <td><strong>${d.artist_name}</strong></td>
            <td>${d.email}</td>
            <td>${d.genre}</td>
            <td>${d.country}</td>
            <td><a href="${d.stream_link}" target="_blank" rel="noopener" class="accent-color">Listen</a></td>
            <td><span class="badge badge-${d.status} px-2 py-1" style="font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;">${d.status}</span></td>
            <td class="text-muted">${new Date(d.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</td>
        </tr>
    `).join('');
})();
</script>
</body>
</html>
