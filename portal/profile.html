<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>My Profile — Off-Limits Artist Portal</title>
    <link rel="icon" type="image/jpeg" href="../assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/portal.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <a href="../index.html" class="text-decoration-none d-flex align-items-center gap-2">
            <img src="../assets/images/Logo.jpg" alt="Off-Limits Entertainment" style="height:32px;width:auto;border-radius:3px;">
            <span class="brand-font text-white" style="font-size:0.9rem;">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
        </a>
        <p class="text-muted mb-0 mt-1" style="font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;">Artist Portal</p>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
        <a href="releases.html"><i class="bi bi-vinyl-fill"></i> My Releases</a>
        <a href="analytics.html"><i class="bi bi-bar-chart-fill"></i> Analytics</a>
        <a href="royalties.html"><i class="bi bi-cash-stack"></i> Royalties</a>
        <a href="events.html"><i class="bi bi-calendar-event-fill"></i> Events</a>
        <a href="profile.html" class="active"><i class="bi bi-person-fill"></i> My Profile</a>
        <a href="messages.html"><i class="bi bi-chat-dots-fill"></i> Messages</a>
        <a href="demos.html"><i class="bi bi-music-note-list"></i> Demo Submissions</a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" id="portalLogout" class="d-flex align-items-center gap-2 text-muted text-decoration-none" style="font-size:0.85rem;">
            <i class="bi bi-box-arrow-left"></i> Sign Out
        </a>
    </div>
</aside>

<main class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button class="sidebar-toggle-btn" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div>
                <h4 class="brand-font mb-0" style="font-size:1rem;">My Profile</h4>
                <p class="text-muted small mb-0">Welcome back, <span class="accent-color" data-artist-name>Artist</span></p>
            </div>
        </div>
        <a href="../index.html" class="btn btn-sm btn-outline-secondary" style="border-radius:0;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;">
            <i class="bi bi-globe me-1"></i>View Site
        </a>
    </div>

    <div id="profileMsg" class="alert d-none" style="border-radius:0;"></div>

    <form id="profileForm" style="max-width:700px;">
        <div class="mb-3">
            <label class="portal-label">Artist Name</label>
            <input type="text" class="form-control portal-input" id="fieldName" disabled>
        </div>
        <div class="mb-3">
            <label class="portal-label">Genre</label>
            <input type="text" name="genre" class="form-control portal-input" id="fieldGenre">
        </div>
        <div class="mb-3">
            <label class="portal-label">Bio</label>
            <textarea name="bio" rows="4" class="form-control portal-input" id="fieldBio"></textarea>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="portal-label">Spotify URL</label>
                <input type="url" name="spotify_url" class="form-control portal-input" id="fieldSpotify">
            </div>
            <div class="col-md-6">
                <label class="portal-label">Apple Music URL</label>
                <input type="url" name="apple_url" class="form-control portal-input" id="fieldApple">
            </div>
            <div class="col-md-6">
                <label class="portal-label">Instagram</label>
                <input type="text" name="instagram" class="form-control portal-input" id="fieldInstagram">
            </div>
            <div class="col-md-6">
                <label class="portal-label">YouTube</label>
                <input type="text" name="youtube" class="form-control portal-input" id="fieldYoutube">
            </div>
        </div>
        <button type="submit" class="portal-btn-accent">Save Changes</button>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/portal.js"></script>
<script>
(async () => {
    const { artist } = await requirePortalAuth();

    document.getElementById('fieldName').value = artist.name || '';
    document.getElementById('fieldGenre').value = artist.genre || '';
    document.getElementById('fieldBio').value = artist.bio || '';
    document.getElementById('fieldSpotify').value = artist.spotify_url || '';
    document.getElementById('fieldApple').value = artist.apple_url || '';
    document.getElementById('fieldInstagram').value = artist.instagram || '';
    document.getElementById('fieldYoutube').value = artist.youtube || '';

    const msg = document.getElementById('profileMsg');
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const { error } = await supabaseClient.from('artists').update({
            genre: fd.get('genre'),
            bio: fd.get('bio'),
            spotify_url: fd.get('spotify_url') || null,
            apple_url: fd.get('apple_url') || null,
            instagram: fd.get('instagram') || null,
            youtube: fd.get('youtube') || null,
        }).eq('id', artist.id);

        msg.classList.remove('d-none', 'alert-success', 'alert-danger');
        if (error) {
            msg.classList.add('alert-danger');
            msg.textContent = 'Failed to save. Please try again.';
        } else {
            msg.classList.add('alert-success');
            msg.textContent = 'Profile updated successfully.';
        }
    });
})();
</script>
</body>
</html>
