<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Full Roster | Off-Limits Entertainment</title>
    <link rel="icon" type="image/jpeg" href="assets/images/Logo.jpg">
    <link rel="apple-touch-icon" href="assets/images/Logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body style="cursor:auto;">

<nav class="navbar navbar-expand-lg navbar-dark fixed-top scrolled" id="mainNavbar">
    <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
            <img src="assets/images/Logo.jpg" alt="Off-Limits Entertainment" class="navbar-logo">
            <span class="brand-font fw-bold fs-4">OFF<span class="accent-color">-</span>LIMITS<span class="accent-color">.</span></span>
        </a>
        <a href="index.html" class="btn btn-outline-light btn-sm px-3 text-uppercase fw-bold ms-auto">
            <i class="bi bi-arrow-left me-1"></i>Back to Site
        </a>
    </div>
</nav>

<header class="page-hero">
    <div class="container">
        <span class="section-eyebrow">The Family</span>
        <h1 class="section-title brand-font">Full <span class="accent-color">Roster</span></h1>
    </div>
</header>

<main class="section-dark py-section">
    <div class="container">
        <div id="rosterState" class="state-msg">Loading roster…</div>
        <div class="row g-4" id="rosterGrid"></div>
    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <div class="footer-bottom py-4">
            <p class="small text-muted mb-0">&copy; 2026 Off-Limits Entertainment. All Rights Reserved. Abuja, Nigeria.</p>
            <a href="index.html" class="small text-muted">Back to Home</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/artists-fallback.js"></script>
<script>
    function renderRoster(artists) {
        const grid = document.getElementById('rosterGrid');
        const state = document.getElementById('rosterState');
        if (!artists.length) {
            state.textContent = 'No artists found.';
            return;
        }
        state.remove();
        grid.innerHTML = artists.map(a => `
            <div class="col-6 col-md-4 col-lg-3">
                <a href="artist.html?id=${encodeURIComponent(a.slug)}" class="text-decoration-none">
                    <div class="artist-card">
                        <div class="artist-img-wrap">
                            <img src="${a.photo_url || 'assets/images/Logo.jpg'}" alt="${a.name}" class="img-fluid" loading="lazy" decoding="async">
                        </div>
                        <div class="artist-info">
                            <h5 class="fw-bold mb-0 text-white">${a.name}</h5>
                            <p class="small accent-color mb-0">${a.genre}</p>
                        </div>
                    </div>
                </a>
            </div>
        `).join('');
    }

    (async () => {
        if (supabaseClient) {
            const { data, error } = await supabaseClient
                .from('artists')
                .select('slug, name, genre, photo_url')
                .eq('is_active', true)
                .order('name');
            if (!error && data && data.length) {
                renderRoster(data);
                return;
            }
        }
        renderRoster(window.ARTISTS_FALLBACK);
    })();
</script>
</body>
</html>
